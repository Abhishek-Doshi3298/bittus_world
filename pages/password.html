<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Enter Bittu's World</title>

    <link rel="stylesheet" href="../css/password.css">

</head>

<body>

    <!-- Sky Background -->

    <div id="sky">

        <div id="aurora">

            <div class="aurora ribbon1"></div>
            <div class="aurora ribbon2"></div>
            <div class="aurora ribbon3"></div>

        </div>

        <div id="stars"></div>

        <div class="moon"></div>

        <div id="clouds"></div>

        <div id="fireflies"></div>

    </div>

    <!-- Password Gate -->

    <main id="passwordScene">

        <section class="gate-card">

            <div class="lock">🔐</div>

            <h1>Welcome Home, Bittu</h1>

            <p class="message">
                This world was made only for you.
            </p>

            <p class="hint">
                Enter the magic word to open it.
            </p>

            <input 
                type="password" 
                id="passwordInput" 
                placeholder="Magic word..."
                autocomplete="off"
            >

            <button id="unlockButton">
                Unlock World ✨
            </button>

            <p id="errorMessage"></p>

        </section>

    </main>

    <script src="../js/skyEngine.js"></script>

    <script src="../js/password.js"></script>

</body>

</html>
